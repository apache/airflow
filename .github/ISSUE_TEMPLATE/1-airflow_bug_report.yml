---
name: Airflow Issue report
description: Report bugs for airflow-core, task sdk, providers, helm chart etc
labels: ["kind:bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      # yamllint disable rule:line-length
      value: "
        <img src='https://raw.githubusercontent.com/apache/airflow/main/airflow-core/docs/img/logos/airflow_64x64_emoji_transparent.png' align='left' width='80' height='80'>
        Thank you for finding the time to report the problem!

        We really appreciate the community's efforts to improve Airflow.

        Note, you do not need to create an issue if you have a change ready to submit!

        You can open a [pull request](https://github.com/apache/airflow/pulls) immediately instead.

        Please note that reporting a bug does not guarantee it will be fixed, as the implementation depends
        on community interest and availability.
        Therefore, please do not request or expect specific timelines or ETAs. The fastest way to fix bugs is
        to submit a PR yourself.

        For reporting security issues in any version, please **do not** use this form and refer to the
        [Security Reporting Guidelines](https://github.com/apache/airflow/blob/main/.github/SECURITY.md)
        instead.
        <br clear='left'/>"
  - type: dropdown
    attributes:
      label: Under which category would you file this issue?
      multiple: false
      options:
        - "Providers"
        - "Airflow Core"
        - "Helm chart"
        - "Task SDK"
    validations:
      required: true
  - type: input
    attributes:
      label: Apache Airflow version
      # yamllint disable rule:line-length
      description: >
        Enter your Airflow version.
        **Please note:** Airflow 2.x is in limited support (critical and security fixes only), and reaches
        EOL on April 22, 2026 - see the
        [Airflow 2 EOL page]
        (https://airflow.apache.org/docs/apache-airflow/stable/installation/supported-versions.html)
        for more information.
        Remember, you are encouraged to test with the latest release or on the `main` branch to verify your issue still exists, especially if
        your version is at least a minor version older than the [current stable release](https://airflow.apache.org/docs/apache-airflow/stable/installation/supported-versions.html#version-life-cycle).
    # yamllint enable rule:line-length
      placeholder: Run `airflow version` and paste the output here
    validations:
      required: true
  - type: textarea
    attributes:
      label: What happened and how to reproduce it?
      description: >
        Describe what happened and please make sure you provide a
        reproducible step-by-step case of how to reproduce the problem as
        minimally and precisely as possible.
      placeholder: >
        Please provide the context in which the problem occurred and keep
        in mind we do not have access to your cluster or Dags. Remember that
        non-reproducible issues will be closed! Opening a discussion is
        recommended as a first step. Feel free to use the following template:
        **Issue Description **
        < describe your issue >
        **Steps to reproduce:**
        < detailed steps to reproduce >
    validations:
      required: true
  - type: textarea
    attributes:
      label: What you think should happen instead?
      description: What do you think went wrong?
      placeholder: >
        Please explain why you think the behaviour is erroneous. It is extremely helpful if you copy&paste
        the fragment of logs showing the exact error messages or wrong behaviour and screenshots for
        UI problems or YouTube link to a video of you demonstrating the problem. You can include files by
        dragging and dropping them here.
  - type: input
    attributes:
      label: Operating System
      description: What Operating System are you using?
      placeholder: "You can get it via `cat /etc/os-release` for example"
  - type: dropdown
    attributes:
      label: Deployment
      description: >
        What kind of deployment do you have? If you use a Managed Service, consider first using regular
        channels of reporting issues for the service.
      multiple: false
      options:
        - "Official Apache Airflow Helm Chart"
        - "Other 3rd-party Helm chart"
        - "Docker-Compose"
        - "Other Docker-based deployment"
        - "Virtualenv installation"
        - "Astronomer"
        - "Google Managed Service for Apache Airflow"
        - "Amazon (AWS) MWAA"
        - "Microsoft ADF Managed Airflow"
        - "Other"
  - type: dropdown
    attributes:
      label: Apache Airflow Provider(s)
      description: >
        Provider(s) that the issue report is about (you can choose more than one). If the issue
        category isn't "Providers", you can leave this field empty.
      multiple: true
      options:
        - airbyte
        - akeyless
        - alibaba
        - amazon
        - apache-beam
        - apache-cassandra
        - apache-drill
        - apache-druid
        - apache-flink
        - apache-hdfs
        - apache-hive
        - apache-iceberg
        - apache-impala
        - apache-kafka
        - apache-kylin
        - apache-livy
        - apache-pig
        - apache-pinot
        - apache-spark
        - apache-tinkerpop
        - apprise
        - arangodb
        - asana
        - atlassian-jira
        - celery
        - cloudant
        - cncf-kubernetes
        - cohere
        - common-ai
        - common-compat
        - common-io
        - common-messaging
        - common-sql
        - databricks
        - datadog
        - dbt-cloud
        - dingding
        - discord
        - docker
        - edge3
        - elasticsearch
        - exasol
        - fab
        - facebook
        - ftp
        - git
        - github
        - google
        - grpc
        - hashicorp
        - http
        - imap
        - influxdb
        - informatica
        - jdbc
        - jenkins
        - keycloak
        - microsoft-azure
        - microsoft-mssql
        - microsoft-psrp
        - microsoft-winrm
        - mongo
        - mysql
        - neo4j
        - odbc
        - openai
        - openfaas
        - openlineage
        - opensearch
        - opsgenie
        - oracle
        - pagerduty
        - papermill
        - pgvector
        - pinecone
        - postgres
        - presto
        - qdrant
        - redis
        - salesforce
        - samba
        - segment
        - sendgrid
        - sftp
        - singularity
        - slack
        - smtp
        - snowflake
        - sqlite
        - ssh
        - standard
        - tableau
        - telegram
        - teradata
        - trino
        - vertica
        - vespa
        - weaviate
        - yandex
        - ydb
        - zendesk
  - type: textarea
    attributes:
      label: Versions of Apache Airflow Providers
      description: What Apache Airflow Providers versions are you using?
      placeholder: You can use `pip freeze | grep apache-airflow-providers` (you can leave only relevant ones)
  - type: dropdown
    attributes:
      label: Official Helm Chart version
      description: >
        What Apache Airflow Helm Chart version are you using? If the issue category
                isn't "Helm chart", select "Not Applicable".
      multiple: false
      options:
        - "Not Applicable"
        - "1.21.0 (latest released)"
        - "1.20.0"
        - "1.19.0"
        - "1.18.0"
        - "1.17.0"
        - "1.16.0"
        - "1.15.0"
        - "1.14.0"
        - "1.13.1"
        - "1.13.0"
        - "1.12.0"
        - "1.11.0"
        - "1.10.0"
        - "1.9.0"
        - "1.8.0"
        - "1.7.0"
        - "1.6.0"
        - "1.5.0"
        - "1.4.0"
        - "1.3.0"
        - "1.2.0"
        - "1.1.0"
        - "1.0.0"
        - "main (development)"
      default: 0
    validations:
      required: true
  - type: input
    attributes:
      label: Kubernetes Version
      description: Which Kubernetes Version do you use? Enter "Not Applicable" if the issue type isn't
        "Helm chart".
  - type: textarea
    attributes:
      label: Helm Chart configuration
      description: Additional description of your Helm Chart configuration. Enter "Not Applicable" if the
        issue type isn't "Helm chart".
      placeholder: >
        Enter any relevant details of your Helm Chart configuration. Maybe you can
        paste your `values.yaml` or important parts of it here? Make sure to surround the code
        you paste with ``` ```.
  - type: textarea
    attributes:
      label: Docker Image customizations
      description: What are the specific modification you've made in your image?
      placeholder: >
        If you have not customized your Docker image, you can enter "Not Applicable".
        Did you extend or customise the official Airflow image? Did you add any packages? Maybe
        you can share a link to your image, or copy the Dockerfile and `docker build` commands
        you used to build the image? Make sure to surround the code you paste with ``` ```.
  - type: textarea
    attributes:
      label: Anything else?
      description: Anything else we need to know?
      placeholder: >
        How often does this problem occur? (Once? Every time? Only when certain conditions are met?)
        Any relevant logs to include? Put them here inside fenced
        ``` ``` blocks or inside a foldable details tag if it's long:
        <details><summary>x.log</summary> lots of stuff </details>
  - type: checkboxes
    attributes:
      label: Are you willing to submit PR?
      description: >
        This is absolutely not required, but we are happy to guide you in the contribution process
        especially if you already have a good understanding of how to implement the fix.
        Airflow is a community-managed project and we love to bring new contributors in.
        Find us in #new-contributors on Slack!
      options:
        - label: Yes I am willing to submit a PR!
  - type: checkboxes
    attributes:
      label: Code of Conduct
      description: >
        The Code of Conduct helps create a safe space for everyone. We require
        that everyone agrees to it.
      options:
        - label: >
            I agree to follow this project's
            [Code of Conduct](https://github.com/apache/airflow/blob/main/CODE_OF_CONDUCT.md)
          required: true
  - type: markdown
    attributes:
      value: "Thanks for completing our form!"
