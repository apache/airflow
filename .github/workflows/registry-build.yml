---
name: Build & Publish Registry
on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      destination:
        description: "Publish to live or staging S3 bucket"
        required: true
        type: choice
        options:
          - staging
          - live
        default: staging
      provider:
        description: "Provider ID(s) for incremental build (space-separated, empty = full build)"
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      destination:
        description: "Publish to live or staging S3 bucket"
        required: false
        type: string
        default: staging
      provider:
        description: "Provider ID(s) for incremental build (space-separated, empty = full build)"
        required: false
        type: string
        default: ""
    secrets:
      DOCS_AWS_ACCESS_KEY_ID:
        required: true
      DOCS_AWS_SECRET_ACCESS_KEY:
        required: true

permissions:
  contents: read
  packages: read

jobs:
  build-ci-image:
    name: "Build CI image"
    uses: ./.github/workflows/ci-image-build.yml
    permissions:
      contents: read
      packages: write
    if: >
      github.event_name == 'workflow_call' ||
      contains(fromJSON('[
        "ashb",
        "bugraoz93",
        "eladkal",
        "ephraimbuddy",
        "jedcunningham",
        "jscheffl",
        "kaxil",
        "pierrejeambrun",
        "shahar1",
        "potiuk",
        "utkarsharma2",
        "vincbeck"
        ]'), github.event.sender.login)
    with:
      runners: '["ubuntu-22.04"]'
      platform: "linux/amd64"
      push-image: "false"
      upload-image-artifact: "true"
      upload-mount-cache-artifact: "false"
      python-versions: '["3.12"]'
      branch: "main"
      constraints-branch: "constraints-main"
      use-uv: "true"
      upgrade-to-newer-dependencies: "false"
      docker-cache: "registry"
      disable-airflow-repo-cache: "false"

  build-and-publish-registry:
    timeout-minutes: 30
    name: "Build & Publish Registry"
    needs: [build-ci-image]
    runs-on: ubuntu-latest
    env:
      SCARF_ANALYTICS: "false"
      DO_NOT_TRACK: "1"
      EXISTING_REGISTRY_DIR: /tmp/existing-registry
      REGISTRY_DATA_DIR: dev/registry
      REGISTRY_PROVIDERS_JSON: providers.json
      REGISTRY_MODULES_JSON: modules.json
      REGISTRY_SITE_DATA_DIR: registry/src/_data
      REGISTRY_SITE_VERSIONS_DIR: registry/src/_data/versions
      REGISTRY_SITE_LOGOS_DIR: registry/public/logos
      REGISTRY_CACHE_CONTROL: public, max-age=300
    permissions:
      contents: read
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          # Tags drive the phantom-version filter in extract_metadata.py
          # (only versions with a real `providers-<id>/<ver>` tag are
          # treated as released). Without this, the filter silently
          # falls back to `versions[0]` and ships phantom versions.
          fetch-tags: true

      - name: "Prepare breeze & CI image"
        uses: ./.github/actions/prepare_breeze_and_image
        with:
          python: "3.12"
          platform: "linux/amd64"
          use-uv: "true"
          make-mnt-writeable-and-cleanup: "true"

      - name: "Install AWS CLI v2"
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          rm /tmp/awscliv2.zip
          sudo /tmp/aws/install --update
          rm -rf /tmp/aws/

      - name: "Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.DOCS_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.DOCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: "Determine S3 destination"
        id: destination
        env:
          DESTINATION: ${{ inputs.destination || 'staging' }}
        run: |
          if [[ "${DESTINATION}" == "live" ]]; then
            echo "bucket=s3://live-docs-airflow-apache-org/registry/" >> "${GITHUB_OUTPUT}"
          else
            echo "bucket=s3://staging-docs-airflow-apache-org/registry/" >> "${GITHUB_OUTPUT}"
          fi
          echo "Publishing registry to ${DESTINATION}"

      # --- Incremental: download existing data from S3 ---
      - name: "Download existing registry data from S3"
        id: download-existing
        if: inputs.provider != ''
        env:
          S3_BUCKET: ${{ steps.destination.outputs.bucket }}
        run: |
          mkdir -p "${EXISTING_REGISTRY_DIR}"
          PROVIDERS_URL="${S3_BUCKET}api/${REGISTRY_PROVIDERS_JSON}"
          MODULES_URL="${S3_BUCKET}api/${REGISTRY_MODULES_JSON}"
          if aws s3 cp \
            "${PROVIDERS_URL}" \
            "${EXISTING_REGISTRY_DIR}/${REGISTRY_PROVIDERS_JSON}" \
            2>/dev/null; then
            echo "found=true" >> "${GITHUB_OUTPUT}"
            aws s3 cp "${MODULES_URL}" "${EXISTING_REGISTRY_DIR}/${REGISTRY_MODULES_JSON}" || true
          else
            echo "found=false" >> "${GITHUB_OUTPUT}"
            echo "No existing registry data on S3"
          fi

      # --- Extract provider metadata ---
      - name: "Extract registry data (breeze)"
        env:
          PROVIDER: ${{ inputs.provider }}
          DESTINATION: ${{ inputs.destination }}
        run: |
          # Staging dispatches preview unreleased providers (maintainers want to
          # verify newly-bumped versions look right before tagging). Live builds
          # filter them so the production registry never ships pointers to
          # non-existent PyPI releases / GitHub tags / docs pages.
          ALLOW_UNRELEASED=""
          if [[ "${DESTINATION}" == "staging" ]]; then
            ALLOW_UNRELEASED="--allow-unreleased"
          fi
          if [[ -n "${PROVIDER}" ]]; then
            breeze registry extract-data --python 3.12 --provider "${PROVIDER}" ${ALLOW_UNRELEASED}
          else
            breeze registry extract-data --python 3.12 ${ALLOW_UNRELEASED}
          fi

      # --- Incremental: merge new data with existing ---
      - name: "Merge with existing registry data"
        if: inputs.provider != '' && steps.download-existing.outputs.found == 'true'
        run: |
          uv run --project dev/registry dev/registry/merge_registry_data.py \
            --existing-providers "${EXISTING_REGISTRY_DIR}/${REGISTRY_PROVIDERS_JSON}" \
            --existing-modules "${EXISTING_REGISTRY_DIR}/${REGISTRY_MODULES_JSON}" \
            --new-providers "${REGISTRY_DATA_DIR}/${REGISTRY_PROVIDERS_JSON}" \
            --new-modules "${REGISTRY_DATA_DIR}/${REGISTRY_MODULES_JSON}" \
            --output "${REGISTRY_DATA_DIR}/"

      - name: "Copy breeze output to registry data"
        run: |
          mkdir -p "${REGISTRY_SITE_VERSIONS_DIR}"
          cp \
            "${REGISTRY_DATA_DIR}/${REGISTRY_PROVIDERS_JSON}" \
            "${REGISTRY_SITE_DATA_DIR}/${REGISTRY_PROVIDERS_JSON}"
          cp \
            "${REGISTRY_DATA_DIR}/${REGISTRY_MODULES_JSON}" \
            "${REGISTRY_SITE_DATA_DIR}/${REGISTRY_MODULES_JSON}"
          VERSIONS_SRC="${REGISTRY_DATA_DIR}/output/versions"
          if [ -d "${VERSIONS_SRC}" ] && ls "${VERSIONS_SRC}/"* &>/dev/null; then
            cp -r "${VERSIONS_SRC}/"* "${REGISTRY_SITE_VERSIONS_DIR}/"
          fi
          # Copy provider logos extracted by extract_metadata.py.
          # The directory may exist but be empty (incremental build for
          # a provider without logos), so check for files before copying.
          LOGOS_SRC="${REGISTRY_DATA_DIR}/logos"
          if [ -d "${LOGOS_SRC}" ] && ls "${LOGOS_SRC}/"* &>/dev/null; then
            mkdir -p "${REGISTRY_SITE_LOGOS_DIR}"
            cp -r "${LOGOS_SRC}/"* "${REGISTRY_SITE_LOGOS_DIR}/"
          fi

      - name: "Setup pnpm"
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v6.0.3
        with:
          version: 10

      - name: "Setup Node.js"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: 'registry/pnpm-lock.yaml'

      - name: "Install Node.js dependencies"
        working-directory: registry
        run: pnpm install --frozen-lockfile

      - name: "Build registry site"
        working-directory: registry
        env:
          REGISTRY_PATH_PREFIX: "/registry/"
        run: pnpm build

      - name: "Upload registry artifact"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: registry-site
          path: registry/_site
          retention-days: 7
          if-no-files-found: error

      - name: "Sync registry to S3"
        env:
          S3_BUCKET: ${{ steps.destination.outputs.bucket }}
          PROVIDER: ${{ inputs.provider }}
        run: |
          # Incremental builds only extract data for the target provider(s).
          # Eleventy rebuilds all pages, but non-target providers have
          # incomplete data (no connections/parameters, wrong version info).
          # Exclude both per-provider API JSON and HTML pages from the main
          # sync, then selectively upload only the target provider's files.
          EXCLUDE_PROVIDERS=()
          if [[ -n "${PROVIDER}" ]]; then
            # Exclude per-provider subtrees but re-include global listing
            # pages. AWS CLI processes filters in order — later rules win.
            EXCLUDE_PROVIDERS=(
              --exclude "api/providers/*"
              --exclude "providers/*"
              --include "providers/index.html"
            )
          fi

          aws s3 sync registry/_site/ "${S3_BUCKET}" \
            --cache-control "${REGISTRY_CACHE_CONTROL}" \
            --exclude "pagefind/*" \
            "${EXCLUDE_PROVIDERS[@]}"

          # For incremental builds, sync only the target provider's files.
          if [[ -n "${PROVIDER}" ]]; then
            for pid in ${PROVIDER}; do
              aws s3 sync "registry/_site/api/providers/${pid}/" \
                "${S3_BUCKET}api/providers/${pid}/" \
                --cache-control "${REGISTRY_CACHE_CONTROL}"
              aws s3 sync "registry/_site/providers/${pid}/" \
                "${S3_BUCKET}providers/${pid}/" \
                --cache-control "${REGISTRY_CACHE_CONTROL}"
            done
          fi

          # Pagefind generates content-hashed filenames (e.g. en_181da6f.pf_index).
          # Each rebuild produces new hashes, so --delete is needed to remove stale
          # index files. This is separate from the main sync which intentionally
          # omits --delete to preserve files written by other steps (publish-versions).
          aws s3 sync registry/_site/pagefind/ "${S3_BUCKET}pagefind/" \
            --cache-control "${REGISTRY_CACHE_CONTROL}" --delete

      - name: "Publish version metadata"
        env:
          S3_BUCKET: ${{ steps.destination.outputs.bucket }}
        run: breeze registry publish-versions --s3-bucket "${S3_BUCKET}"
