---
name: Registry Tests
on:  # yamllint disable-line rule:truthy
  pull_request:
    branches: [main]
    paths:
      - 'dev/registry/**'
      - 'registry/**'
      - 'providers/*/provider.yaml'
      - 'providers/*/*/provider.yaml'
      - '.github/workflows/registry-tests.yml'
  push:
    branches: [main]
    paths:
      - 'dev/registry/**'

permissions:
  contents: read

concurrency:
  group: registry-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  registry-tests:
    name: "Registry extraction tests"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: "Install uv"
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: "3.12"

      - name: "Run registry extraction tests"
        run: cd dev/registry && uv run --group dev pytest tests/ -v
