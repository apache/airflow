---
name: "CodeQL"

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches: ['main', 'v[0-9]+-[0-9]+-test', 'v[0-9]+-[0-9]+-stable']
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read
concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ["ubuntu-22.04"]
    strategy:
      fail-fast: false
      matrix:
        language: ['python', 'javascript', 'actions', 'go', 'java']

    permissions:
      actions: read
      contents: read
      pull-requests: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      # keep this in sync with the jvmTarget in java-sdk/build.gradle.kts
      - name: Setup Java
        if: matrix.language == 'java'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        if: matrix.language != 'java'
        uses: github/codeql-action/autobuild@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5

      - name: Build Java SDK
        if: matrix.language == 'java'
        working-directory: java-sdk
        run: ./gradlew classes testClasses

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          # Provide more context to the SARIF output (shows up in run.automationDetails.id field)
          category: "/language:${{matrix.language}}"
