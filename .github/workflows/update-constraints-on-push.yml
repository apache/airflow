---
name: Update constraints (on uv.lock push or manual dispatch)
# This workflow refreshes the pinned constraint files stored in the
# `constraints-*` branches. It runs automatically whenever `uv.lock` changes on
# `main` or a `vX-Y-test` branch, and can also be triggered manually via the
# "Run workflow" button (workflow_dispatch) - for example to pick up newly
# released providers/dependencies from PyPI just before promoting an RC.
#
# The manual run is always launched from `main` (so the workflow definition and
# `breeze` come from `main`), and the `ref` input selects the commit-ish
# (branch, tag or commit hash) whose sources the constraints are refreshed from.
# The `constraints-X-Y` branch to push to is derived from that ref's
# `dev/breeze/src/airflow_breeze/branch_defaults.py`, so no cherry-pick to the
# `vX-Y-test` / `vX-Y-stable` branch is needed.
# See dev/MANUALLY_GENERATING_IMAGE_CACHE_AND_CONSTRAINTS.md for details.
on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
      - v[0-9]+-[0-9]+-test
    paths:
      - 'uv.lock'
  workflow_dispatch:
    inputs:
      # `ref` is optional. Leave it empty to refresh constraints for the branch
      # you run the workflow from (normally `main` -> `constraints-main`). Set a
      # branch, tag or commit to refresh a specific line, e.g.
      # `v3-3-stable` -> `constraints-3-3`. The target `constraints-X-Y` branch
      # is derived from that ref's branch_defaults.py.
      ref:
        description: "Optional repo reference to build constraints (e.g. v3-3-stable)"
        required: false
        default: ""
        type: string
      upgrade-to-newer-dependencies:
        description: "Upgrade deps to newest from PyPI"
        type: boolean
        default: true
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.ref }}
  cancel-in-progress: true
env:
  GITHUB_REPOSITORY: ${{ github.repository }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_USERNAME: ${{ github.actor }}
  VERBOSE: "true"
jobs:
  build-info:
    name: "Build info"
    runs-on: ["ubuntu-22.04"]
    # Automatic uv.lock-push runs are unrestricted; manual (workflow_dispatch)
    # runs are limited to release managers (same allowlist as the prod image
    # release workflow) because they push to the protected constraints-* branches.
    if: >-
      github.event_name != 'workflow_dispatch' ||
      contains(fromJSON('[
      "ashb",
      "bugraoz93",
      "eladkal",
      "ephraimbuddy",
      "jedcunningham",
      "jscheffl",
      "kaxil",
      "pierrejeambrun",
      "potiuk",
      "utkarsharma2",
      "vincbeck",
      "vatsrahul1001",
      ]'), github.event.sender.login)
    outputs:
      default-branch: ${{ steps.selective-checks.outputs.default-branch }}
      default-constraints-branch: ${{ steps.selective-checks.outputs.default-constraints-branch }}
      default-python-version: ${{ steps.selective-checks.outputs.default-python-version }}
      python-versions: ${{ steps.selective-checks.outputs.python-versions }}
      python-versions-list-as-string: ${{ steps.selective-checks.outputs.python-versions-list-as-string }}
    steps:
      - name: "Cleanup repo"
        shell: bash
        run: sudo rm -rf ${GITHUB_WORKSPACE}/*
      - name: "Checkout ${{ inputs.ref || github.ref }} ( ${{ inputs.ref || github.sha }} )"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 2
          persist-credentials: false
      - name: "Install Breeze"
        uses: ./.github/actions/breeze
        id: breeze
      - name: "Save github context to file"
        # See ci-amd.yml for the full rationale: avoids ARG_MAX on big PRs by writing the
        # github context to a file, and the single-quoted heredoc makes the zizmor
        # template-injection finding a false positive (no bash expansion happens inside it).
        shell: bash
        run: |  # zizmor: ignore[template-injection]
          cat > "${RUNNER_TEMP}/github_context.json" << '__GITHUB_CONTEXT_END__'
          ${{ toJson(github) }}
          __GITHUB_CONTEXT_END__
      - name: Selective checks
        id: selective-checks
        env:
          PR_LABELS: "[]"
          COMMIT_REF: "${{ inputs.ref || github.sha }}"
          VERBOSE: "false"
          GITHUB_CONTEXT_INPUT: "${{ runner.temp }}/github_context.json"
        run: breeze ci selective-check 2>> ${GITHUB_OUTPUT}
      - name: "Parameters summary"
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ inputs.ref }}
          UPGRADE: ${{ inputs.upgrade-to-newer-dependencies }}
          CONSTRAINTS_BRANCH: ${{ steps.selective-checks.outputs.default-constraints-branch }}
        run: |
          {
            echo "## Update constraints"
            echo ""
            echo "| Parameter | Value |"
            echo "|---|---|"
            echo "| Triggered by | \`${EVENT_NAME}\` |"
            if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
              echo "| Refresh from ref | \`${REF}\` |"
              echo "| Upgrade to newer dependencies | \`${UPGRADE}\` |"
            fi
            echo "| Target constraints branch | \`${CONSTRAINTS_BRANCH}\` |"
          } | tee -a "${GITHUB_STEP_SUMMARY}"

  build-ci-images:
    name: "Build CI images"
    needs: [build-info]
    uses: ./.github/workflows/ci-image-build.yml
    permissions:
      contents: read
      packages: write
    with:
      runners: '["ubuntu-22.04"]'
      platform: "linux/amd64"
      push-image: "false"
      upload-image-artifact: "true"
      upload-mount-cache-artifact: "false"
      python-versions: ${{ needs.build-info.outputs.python-versions }}
      branch: ${{ needs.build-info.outputs.default-branch }}
      constraints-branch: ${{ needs.build-info.outputs.default-constraints-branch }}
      checkout-ref: ${{ inputs.ref }}
      use-uv: "true"
      upgrade-to-newer-dependencies: >-
        ${{ github.event_name == 'workflow_dispatch'
            && inputs.upgrade-to-newer-dependencies && 'true' || 'false' }}
      docker-cache: "registry"
      disable-airflow-repo-cache: "false"

  generate-constraints:
    name: "Generate constraints"
    needs: [build-info, build-ci-images]
    uses: ./.github/workflows/generate-constraints.yml
    with:
      runners: '["ubuntu-22.04"]'
      platform: "linux/amd64"
      python-versions-list-as-string: ${{ needs.build-info.outputs.python-versions-list-as-string }}
      python-versions: ${{ needs.build-info.outputs.python-versions }}
      generate-pypi-constraints: "true"
      generate-no-providers-constraints: "true"
      debug-resources: "false"
      checkout-ref: ${{ inputs.ref }}
      use-uv: "true"
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  update-constraints:
    runs-on: ["ubuntu-22.04"]
    timeout-minutes: 20
    name: "Commit and push constraints"
    needs: [build-info, generate-constraints]
    permissions:
      contents: write
      packages: read
    env:
      PYTHON_VERSIONS: ${{ needs.build-info.outputs.python-versions-list-as-string }}
      CONSTRAINTS_BRANCH: ${{ needs.build-info.outputs.default-constraints-branch }}
    steps:
      - name: "Cleanup repo"
        shell: bash
        run: sudo rm -rf ${GITHUB_WORKSPACE}/*
      - name: "Checkout ${{ github.ref }} ( ${{ github.sha }} )"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Checkout ${{ env.CONSTRAINTS_BRANCH }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          path: "constraints"
          ref: ${{ env.CONSTRAINTS_BRANCH }}
          persist-credentials: true
          fetch-depth: 0
      - name: "Download constraints from the generate-constraints job"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: constraints-*
          path: ./files
      - name: "Diff in constraints for Python: ${{ needs.build-info.outputs.python-versions-list-as-string }}"
        run: ./scripts/ci/constraints/ci_diff_constraints.sh
      - name: >-
          Commit changed constraint files for Python:
          ${{ needs.build-info.outputs.python-versions-list-as-string }}
        run: ./scripts/ci/constraints/ci_commit_constraints.sh
      - name: "Push changes"
        working-directory: "constraints"
        run: git push

  notify-on-failure:
    name: "Notify on failure"
    runs-on: ["ubuntu-22.04"]
    needs: [build-info, build-ci-images, generate-constraints, update-constraints]
    if: failure()
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    steps:
      - name: "Send Slack notification"
        uses: slackapi/slack-github-action@0d95c9a7becc1e6e297d76df9bc735c44f4cbcbc  # v3.0.5
        with:
          method: chat.postMessage
          token: ${{ env.SLACK_BOT_TOKEN }}
          # yamllint disable rule:line-length
          payload: |
            channel: "internal-airflow-ci-cd"
            text: "🚨 Update constraints workflow failed on branch *${{ github.ref_name }}*\n\n*Details:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View the failure log>"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "🚨 Update constraints workflow failed on *${{ github.ref_name }}*\n\n*Details:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View the failure log>"
          # yamllint enable rule:line-length
