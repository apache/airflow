---
name: Anomaly CI

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - anomaly-dev
      - main
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: anomaly-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DEFAULT_PYTHON_VERSION: "3.10"
  PLATFORM: "linux/amd64"

jobs:
  prek-checks:
    name: Prek checks
    runs-on: ["ubuntu-24.04"]
    env:
      PYTHON_MAJOR_MINOR_VERSION: "${{ inputs.default-python-version }}"
      UPGRADE_TO_NEWER_DEPENDENCIES: "${{ inputs.upgrade-to-newer-dependencies }}"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: "Checkout ${{ github.ref }} ( ${{ github.sha }} )"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: "Install Breeze"
        uses: ./.github/actions/breeze
        id: breeze
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
      - name: "Install prek"
        uses: ./.github/actions/install-prek
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          platform: ${{ env.PLATFORM }}
          save-cache: true
      - name: "Static checks (Prek)"
        run: prek --all-files --show-diff-on-failure --color always
        env:
          VERBOSE: "true"
          SKIP: ${{ inputs.skip-prek-hooks }}
          COLUMNS: "202"
          SKIP_GROUP_OUTPUT: "true"
          DEFAULT_BRANCH: ${{ inputs.branch }}
          RUFF_FORMAT: "github"
      - name: "Show prek log on failure"
        run: cat ~/.cache/prek/prek.log || true
        if: failure()

  backend-tests:
    name: Backend tests
    runs-on: ["ubuntu-24.04"]
    timeout-minutes: 60
    steps:
      - name: "Checkout ${{ github.ref }} ( ${{ github.sha }} )"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: "Install Breeze"
        uses: ./.github/actions/breeze
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
      - name: "Run targeted backend tests"
        run: >
          breeze testing core-tests --db-reset
          airflow-core/tests/unit/api_fastapi/core_api/routes/ui

  ui-tests:
    name: UI tests
    runs-on: ["ubuntu-24.04"]
    timeout-minutes: 20
    steps:
      - name: "Checkout ${{ github.ref }} ( ${{ github.sha }} )"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2  # v4.0.0
        with:
          version: 9
          run_install: false
      - name: "Setup node"
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 21
          cache: "pnpm"
          cache-dependency-path: "airflow-core/src/airflow/**/pnpm-lock.yaml"
      - name: "Install and run main UI tests"
        working-directory: airflow-core/src/airflow/ui
        run: |
          pnpm install --frozen-lockfile
          pnpm test
      - name: "Install and run simple auth manager UI tests"
        working-directory: airflow-core/src/airflow/api_fastapi/auth/managers/simple/ui
        run: |
          pnpm install --frozen-lockfile
          pnpm test
