---
name: 'Install prefligit'
description: 'Installs prefligit and related packages'
inputs:
  python-version:
    description: 'Python version to use'
    default: "3.10"
  uv-version:
    description: 'uv version to use'
    default: "0.8.4"  # Keep this comment to allow automatic replacement of uv version
  prefligit-version:
    description: 'prefligit version to use'
    default: "0.0.22"  # Keep this comment to allow automatic replacement of prefligit version
  skip-prefligits:
    description: "Skip some prefligits from installation"
    default: ""
runs:
  using: "composite"
  steps:
    - name: Install prefligit and uv
      shell: bash
      env:
        UV_VERSION: ${{inputs.uv-version}}
        PREFLIGIT_VERSION: ${{inputs.prefligit-version}}
        SKIP: ${{ inputs.skip-prefligits }}
      run: |
        pip install uv==${UV_VERSION} || true
        uv tool install prefligit==${PREFLIGIT_VERSION} --with uv==${UV_VERSION}
      working-directory: ${{ github.workspace }}
    # We need to use tar file with archive to restore all the permissions and symlinks
    - name: "Delete ~.cache"
      run: |
        du ~/ --max-depth=2
        echo
        echo Deleting ~/.cache
        echo
        rm -rf ~/.cache
        echo
      shell: bash
    - name: "Restore prefligit cache"
      uses: apache/infrastructure-actions/stash/restore@1c35b5ccf8fba5d4c3fdf25a045ca91aa0cbc468
      with:
        key: cache-prefligit-v4-${{ inputs.python-version }}-${{ hashFiles('.pre-commit-config.yaml') }}
        path: /tmp/
      id: restore-prefligit-cache
    - name: "Check if prefligit cache tarball exists"
      shell: bash
      run: |
        if [ -f /tmp/cache-prefligit.tar.gz ]; then
          echo "✅ Cache tarball found: /tmp/cache-prefligit.tar.gz"
        else
          echo "❌ Cache tarball missing. Expected /tmp/cache-prefligit.tar.gz"
          exit 1
        fi
      if: steps.restore-prefligit-cache.outputs.stash-hit == 'true'
    - name: "Restore .cache from the tar file"
      run: tar -C ~ -xzf /tmp/cache-prefligit.tar.gz
      shell: bash
      if: steps.restore-prefligit-cache.outputs.stash-hit == 'true'
    - name: "Show restored files"
      run: |
        echo "Restored files"
        du ~/ --max-depth=2
        echo
      shell: bash
      if: steps.restore-prefligit-cache.outputs.stash-hit == 'true'
    - name: Install prefligit hooks
      shell: bash
      run: prefligit install-hooks || (cat ~/.cache/prefligit/prefligit.log && exit 1)
      working-directory: ${{ github.workspace }}
      env:
        SKIP: ${{ inputs.skip-prefligits }}
