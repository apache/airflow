---
# Quick mode: before vs after your change
#
# "before" = main branch version of AGENTS.md + SKILL.md
# "after"  = working tree version
#
# Do not run directly — use eval.sh

x-output-schema: &outputSchema
  type: json_schema
  schema:
    type: object
    required: [runner, command, rationale]
    additionalProperties: false
    properties:
      runner:
        type: string
        enum: [uv, breeze, prek]
      command:
        type: string
      rationale:
        type: string

x-common: &common
  model: claude-sonnet-4-6
  setting_sources: ['project']
  skills: ['airflow-contribution']
  append_allowed_tools: ['Read', 'Grep', 'Glob']
  output_format: *outputSchema

providers:
  - id: anthropic:claude-agent-sdk
    label: before
    config:
      <<: *common
      working_dir: ${ARMS_DIR}/before

  - id: anthropic:claude-agent-sdk
    label: after
    config:
      <<: *common
      working_dir: ${ARMS_DIR}/after

defaultTest:
  options:
    disableVarExpansion: true
  assert:
    - type: skill-used
      value: airflow-contribution

tests: file://cases/*.yaml
