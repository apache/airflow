---
# Full mode: 5-arm research matrix
#
# before  = main's AGENTS.md + main's SKILL.md
# after   = working tree's AGENTS.md + working tree's SKILL.md
# baseline    = no guidance at all
# skill-only  = skill without AGENTS.md
# agents-only = AGENTS.md without skill
#
# Do not run directly — use eval.sh --full

x-output-schema: &outputSchema
  type: json_schema
  schema:
    type: object
    required: [runner, command, rationale]
    additionalProperties: false
    properties:
      runner:
        type: string
        enum: [uv, breeze, prek]
      command:
        type: string
      rationale:
        type: string

x-base: &base
  model: claude-sonnet-4-6
  setting_sources: ['project']
  append_allowed_tools: ['Read', 'Grep', 'Glob']
  output_format: *outputSchema

providers:
  # Core comparison
  - id: anthropic:claude-agent-sdk
    label: before
    config:
      <<: *base
      working_dir: ${ARMS_DIR}/before
      skills: ['airflow-contribution']

  - id: anthropic:claude-agent-sdk
    label: after
    config:
      <<: *base
      working_dir: ${ARMS_DIR}/after
      skills: ['airflow-contribution']

  # Isolation arms
  - id: anthropic:claude-agent-sdk
    label: baseline
    config:
      <<: *base
      working_dir: ${ARMS_DIR}/baseline

  - id: anthropic:claude-agent-sdk
    label: skill-only
    config:
      <<: *base
      working_dir: ${ARMS_DIR}/skill-only
      skills: ['airflow-contribution']

  - id: anthropic:claude-agent-sdk
    label: agents-only
    config:
      <<: *base
      working_dir: ${ARMS_DIR}/agents-only

defaultTest:
  options:
    disableVarExpansion: true

tests: file://cases/*.yaml
