---
default_stages: [pre-commit, pre-push]
minimum_prek_version: '0.3.4'
default_language_version:
  python: python3
repos:
  - repo: local
    hooks:
      - id: mypy-task-sdk-integration-tests
        name: Run mypy for task-sdk-integration-tests
        language: python
        entry: ../scripts/ci/prek/run_mypy_full_dist_local_venv_or_breeze_in_ci.py task-sdk-integration-tests
        pass_filenames: false
        files: ^.*\.py$
        require_serial: true
