[build-system]
requires = [
    "hatchling==1.29.0",
    "packaging==26.0",
    "pathspec==1.0.4",
    "pluggy==1.6.0",
    "tomli==2.4.1; python_version < '3.11'",
    "trove-classifiers==2026.1.14.14",
]
build-backend = "hatchling.build"

[project]
name = "apache-airflow-providers-common-ai"
version = "0.0.1"
description = "Provider package apache-airflow-providers-common-ai for Apache Airflow"
readme = "README.rst"
license = "Apache-2.0"
license-files = ['LICENSE', 'NOTICE']
authors = [
    {name="Apache Software Foundation", email="dev@airflow.apache.org"},
]
maintainers = [
    {name="Apache Software Foundation", email="dev@airflow.apache.org"},
]
keywords = [ "airflow-provider", "common.ai", "airflow", "integration" ]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Environment :: Web Environment",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "Framework :: Apache Airflow",
    "Framework :: Apache Airflow :: Provider",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: System :: Monitoring",
]
requires-python = ">=3.10"

# The dependencies should be modified in place in the generated file.
# Any change in the dependencies is preserved when the file is regenerated
# Make sure to run ``prek update-providers-dependencies --all-files``
# After you modify the dependencies, and rebuild your Breeze CI image with ``breeze ci-image build``
dependencies = [
    "apache-airflow>=3.0.0",
    "apache-airflow-providers-common-compat>=1.14.1",
    "apache-airflow-providers-standard>=1.12.1",
    "pydantic-ai-slim>=1.34.0",
]

# The optional dependencies should be modified in place in the generated file
# Any change in the dependencies is preserved when the file is regenerated
[project.optional-dependencies]
"anthropic" = ["pydantic-ai-slim[anthropic]"]
"bedrock" = ["pydantic-ai-slim[bedrock]"]
"google" = ["pydantic-ai-slim[google]"]
"openai" = ["pydantic-ai-slim[openai]"]
"mcp" = ["pydantic-ai-slim[mcp]"]
"avro" = [
    'fastavro>=1.10.0; python_version < "3.14"',
    'fastavro>=1.12.1; python_version >= "3.14"',
]
"parquet" = [
    "pyarrow>=18.0.0; python_version < '3.14'",
    "pyarrow>=22.0.0; python_version >= '3.14'",
]
"sql" = [
    "apache-airflow-providers-common-sql",
    "sqlglot>=30.0.0",
]
"common.sql" = [
    "apache-airflow-providers-common-sql"
]

[dependency-groups]
dev = [
    "apache-airflow",
    "apache-airflow-task-sdk",
    "apache-airflow-devel-common",
    "apache-airflow-providers-common-compat",
    "apache-airflow-providers-common-sql",
    "apache-airflow-providers-standard",
    # Additional devel dependencies (do not remove this line and add extra development dependencies)
    "sqlglot>=30.0.0",
    "pydantic-ai-slim[mcp]",
    "apache-airflow-providers-common-sql[datafusion]"
]

# To build docs:
#
#    uv run --group docs build-docs
#
# To enable auto-refreshing build with server:
#
#    uv run --group docs build-docs --autobuild
#
# To see more options:
#
#    uv run --group docs build-docs --help
#
docs = [
    "apache-airflow-devel-common[docs]"
]

[tool.uv.sources]
# These names must match the names as defined in the pyproject.toml of the workspace items,
# *not* the workspace folder paths
apache-airflow = {workspace = true}
apache-airflow-devel-common = {workspace = true}
apache-airflow-task-sdk = {workspace = true}
apache-airflow-providers-common-sql = {workspace = true}
apache-airflow-providers-standard = {workspace = true}

[project.urls]
"Documentation" = "https://airflow.apache.org/docs/apache-airflow-providers-common-ai/0.0.1"
"Changelog" = "https://airflow.apache.org/docs/apache-airflow-providers-common-ai/0.0.1/changelog.html"
"Bug Tracker" = "https://github.com/apache/airflow/issues"
"Source Code" = "https://github.com/apache/airflow"
"Slack Chat" = "https://s.apache.org/airflow-slack"
"Mastodon" = "https://fosstodon.org/@airflow"
"YouTube" = "https://www.youtube.com/channel/UCSXwxpWZQ7XZ1WL3wqevChA/"

[project.entry-points."apache_airflow_provider"]
provider_info = "airflow.providers.common.ai.get_provider_info:get_provider_info"

[project.entry-points."airflow.plugins"]
hitl_review = "airflow.providers.common.ai.plugins.hitl_review:HITLReviewPlugin"

[tool.hatch.version]
path = "src/airflow/providers/common/ai/__init__.py"

[tool.hatch.build.targets.sdist]
include = [
    "docs",
    "src/airflow/providers/common/ai",
    "tests",
    "NOTICE"
]
exclude = [
    "src/airflow/__init__.py",
    "src/airflow/providers/__init__.py",
    "src/airflow/providers/common/ai/plugins/www/.pnpm-store",
    "src/airflow/providers/common/ai/plugins/www/node_modules",
]

[tool.hatch.build.targets.custom]
path = "./hatch_build.py"

artifacts = [
    "src/airflow/providers/common/ai/plugins/www/dist",
]

[tool.hatch.build.targets.wheel]
packages = ['src/airflow']
artifacts = [
    "src/airflow/providers/common/ai/plugins/www/dist",
]
exclude = [
    "src/airflow/__init__.py",
    "src/airflow/providers/__init__.py",
    "src/airflow/providers/common/ai/plugins/www/.pnpm-store",
    "src/airflow/providers/common/ai/plugins/www/node_modules",
]
