---
package-name: apache-airflow-providers-common-ai
name: Common AI
description: |
  AI/LLM hooks and operators for Airflow pipelines using `pydantic-ai <https://ai.pydantic.dev/>`__.

state: ready
lifecycle: incubation
source-date-epoch: 1780426378
build-system: hatchling
# note that those versions are maintained by release manager - do not update them manually
versions:
  - 0.4.0
  - 0.3.0
  - 0.2.0
  - 0.1.1
  - 0.1.0

integrations:
  - integration-name: Common AI
    external-doc-url: https://airflow.apache.org/docs/apache-airflow-providers-common-ai/
    how-to-guide:
      - /docs/apache-airflow-providers-common-ai/operators/agent.rst
      - /docs/apache-airflow-providers-common-ai/operators/llm.rst
      - /docs/apache-airflow-providers-common-ai/operators/llm_file_analysis.rst
      - /docs/apache-airflow-providers-common-ai/operators/llm_branch.rst
      - /docs/apache-airflow-providers-common-ai/operators/llm_sql.rst
      - /docs/apache-airflow-providers-common-ai/operators/llm_schema_compare.rst
      - /docs/apache-airflow-providers-common-ai/operators/document_loader.rst
    tags: [ai]
  - integration-name: Pydantic AI
    external-doc-url: https://ai.pydantic.dev/
    tags: [ai]
  - integration-name: MCP Server
    external-doc-url: https://modelcontextprotocol.io/
    tags: [ai]
  - integration-name: LangChain
    external-doc-url: https://python.langchain.com/
    tags: [ai]
  - integration-name: LlamaIndex
    external-doc-url: https://docs.llamaindex.ai/
    how-to-guide:
      - /docs/apache-airflow-providers-common-ai/operators/llamaindex_embedding.rst
      - /docs/apache-airflow-providers-common-ai/operators/llamaindex_retrieval.rst
    tags: [ai]

hooks:
  - integration-name: Pydantic AI
    python-modules:
      - airflow.providers.common.ai.hooks.pydantic_ai
  - integration-name: MCP Server
    python-modules:
      - airflow.providers.common.ai.hooks.mcp
  - integration-name: LangChain
    python-modules:
      - airflow.providers.common.ai.hooks.langchain
  - integration-name: LlamaIndex
    python-modules:
      - airflow.providers.common.ai.hooks.llamaindex

plugins:
  - name: hitl_review
    plugin-class: airflow.providers.common.ai.plugins.hitl_review.HITLReviewPlugin


config:
  common.ai:
    description: |
      Options for the ``apache-airflow-providers-common-ai`` provider.
    options:
      durable_cache_path:
        description: |
          ObjectStorage URI used to persist per-step caches when running
          ``AgentOperator`` / ``@task.agent`` with ``durable=True``. Each task
          execution writes a single JSON file under this path containing its
          cached model responses and tool results, so that on retry the agent
          can replay completed steps instead of re-issuing LLM calls and tool
          invocations. The file is deleted on successful task completion.

          Required when ``durable=True`` is used. Any scheme supported by
          ``airflow.sdk.ObjectStoragePath`` is accepted (``file://``, ``s3://``,
          ``gs://``, ``azure://``, ...).
        version_added: 0.1.0
        type: string
        example: "file:///tmp/airflow_durable_cache"
        default: ""
      otel_export_enabled:
        description: |
          Attach pydantic-ai OpenTelemetry instrumentation to agents created by
          this provider and emit GenAI spans (agent run, model call, tool call,
          token usage) for ``AgentOperator`` / ``@task.agent`` / ``@task.llm``
          and the other LLM operators.

          Spans are emitted through Airflow's existing OpenTelemetry exporter,
          configured under ``[traces]`` / the standard ``OTEL_EXPORTER_OTLP_*``
          environment variables, and nest under the task span so they are
          attributable to the originating DAG run and task instance. The
          provider does not configure an exporter of its own: if core tracing
          (``[traces] otel_on``) is not enabled in the worker process, no spans
          are emitted. Off by default so installing the provider never starts
          shipping spans without opt-in.
        version_added: 0.4.0
        type: boolean
        example: "True"
        default: "False"
      capture_content:
        description: |
          Capture prompt, completion, and tool-call content on the emitted
          GenAI spans (``gen_ai.input.messages`` / ``gen_ai.output.messages``).

          Off by default: only token counts, model id, latency, tool names, and
          finish reason are recorded, never message text. Turning this on exports
          model inputs and outputs to your tracing backend without redaction. Airflow's
          secret masking applies to logs and rendered template fields, not to
          OpenTelemetry span attributes, so it does not scrub this content.
          Enable it only for debugging in a trusted environment. Has no effect
          unless ``otel_export_enabled`` is ``True``.
        version_added: 0.4.0
        type: boolean
        example: "False"
        default: "False"


connection-types:
  - hook-class-name: airflow.providers.common.ai.hooks.pydantic_ai.PydanticAIHook
    hook-name: "Pydantic AI"
    connection-type: pydanticai
    ui-field-behaviour:
      hidden-fields:
        - schema
        - port
        - login
      relabeling:
        password: API Key
      placeholders:
        host: "https://api.openai.com/v1 (optional, for custom endpoints)"
    conn-fields:
      model:
        label: Model
        description: "Model in provider:name format (e.g. anthropic:claude-sonnet-4-20250514, openai:gpt-5)"
        schema:
          type:
            - string
            - 'null'
  - hook-class-name: airflow.providers.common.ai.hooks.pydantic_ai.PydanticAIAzureHook
    hook-name: "Pydantic AI (Azure OpenAI)"
    connection-type: pydanticai-azure
    ui-field-behaviour:
      hidden-fields:
        - schema
        - port
        - login
      relabeling:
        password: API Key
        host: Azure Endpoint
      placeholders:
        host: "https://<resource>.openai.azure.com"
    conn-fields:
      model:
        label: Model
        description: "Azure model identifier (e.g. azure:gpt-4o)"
        schema:
          type:
            - string
            - 'null'
      api_version:
        label: API Version
        description: "Azure OpenAI API version (e.g. 2024-07-01-preview). Falls back to OPENAI_API_VERSION."
        schema:
          type:
            - string
            - 'null'
  - hook-class-name: airflow.providers.common.ai.hooks.pydantic_ai.PydanticAIBedrockHook
    hook-name: "Pydantic AI (AWS Bedrock)"
    connection-type: pydanticai-bedrock
    ui-field-behaviour:
      hidden-fields:
        - schema
        - port
        - login
        - host
        - password
      relabeling: {}
      placeholders: {}
    conn-fields:
      model:
        label: Model
        description: "Bedrock model identifier (e.g. bedrock:us.anthropic.claude-opus-4-5)"
        schema:
          type:
            - string
            - 'null'
      region_name:
        label: AWS Region
        description: "AWS region (e.g. us-east-1). Falls back to AWS_DEFAULT_REGION env var."
        schema:
          type:
            - string
            - 'null'
      aws_access_key_id:
        label: AWS Access Key ID
        description: "IAM access key. Leave empty to use instance role / environment credential chain."
        schema:
          type:
            - string
            - 'null'
      aws_secret_access_key:
        label: AWS Secret Access Key
        description: "IAM secret key."
        schema:
          type:
            - string
            - 'null'
      aws_session_token:
        label: AWS Session Token
        description: "Temporary session token (optional)."
        schema:
          type:
            - string
            - 'null'
      profile_name:
        label: AWS Profile Name
        description: "Named AWS credentials profile (optional)."
        schema:
          type:
            - string
            - 'null'
      api_key:
        label: Bearer Token
        description: "AWS bearer token (alt. to IAM key/secret). Falls back to AWS_BEARER_TOKEN_BEDROCK."
        schema:
          type:
            - string
            - 'null'
      base_url:
        label: Custom Endpoint URL
        description: "Override the Bedrock runtime endpoint URL (optional)."
        schema:
          type:
            - string
            - 'null'
      aws_read_timeout:
        label: Read Timeout (s)
        description: "boto3 read timeout in seconds (float, optional)."
        schema:
          type:
            - number
            - 'null'
      aws_connect_timeout:
        label: Connect Timeout (s)
        description: "boto3 connect timeout in seconds (float, optional)."
        schema:
          type:
            - number
            - 'null'
  - hook-class-name: airflow.providers.common.ai.hooks.pydantic_ai.PydanticAIVertexHook
    hook-name: "Pydantic AI (Google Vertex AI)"
    connection-type: pydanticai-vertex
    ui-field-behaviour:
      hidden-fields:
        - schema
        - port
        - login
        - host
        - password
      relabeling: {}
      placeholders: {}
    conn-fields:
      model:
        label: Model
        description: "Google model identifier (e.g. google-vertex:gemini-2.0-flash)"
        schema:
          type:
            - string
            - 'null'
      project:
        label: GCP Project
        description: "Google Cloud project ID. Falls back to GOOGLE_CLOUD_PROJECT env var."
        schema:
          type:
            - string
            - 'null'
      location:
        label: Location / Region
        description: "Vertex AI region (e.g. us-central1). Falls back to GOOGLE_CLOUD_LOCATION env var."
        schema:
          type:
            - string
            - 'null'
      vertexai:
        label: Force Vertex AI Mode
        description: "Force Vertex AI mode. Auto-detected when project/location/credentials are set."
        schema:
          type:
            - boolean
            - 'null'
      api_key:
        label: API Key
        description: "Google API key for Gen Language API or Vertex AI. Falls back to GOOGLE_API_KEY."
        schema:
          type:
            - string
            - 'null'
      service_account_info:
        label: Service Account Info
        description: "Service account key as inline dict (JSON with type, project_id, private_key, etc.)."
        schema:
          type:
            - object
            - 'null'
      base_url:
        label: Custom Endpoint URL
        description: "Override the Google API base URL (optional)."
        schema:
          type:
            - string
            - 'null'
  - hook-class-name: airflow.providers.common.ai.hooks.mcp.MCPHook
    hook-name: "MCP Server"
    connection-type: mcp
    ui-field-behaviour:
      hidden-fields:
        - schema
        - port
        - login
      relabeling:
        password: Auth Token
      placeholders:
        host: "http://localhost:3001/mcp (for HTTP/SSE transport)"
    conn-fields:
      transport:
        label: Transport
        description: "Transport type: http (default), sse, or stdio"
        schema:
          type:
            - string
            - 'null'
      command:
        label: Command
        description: "Command to run for stdio transport (e.g. uvx, python)"
        schema:
          type:
            - string
            - 'null'
      args:
        label: Arguments
        description: "JSON array of arguments for stdio command (e.g. [\"mcp-run-python\"])"
        schema:
          type:
            - string
            - 'null'
  - hook-class-name: airflow.providers.common.ai.hooks.langchain.LangChainHook
    hook-name: "LangChain"
    connection-type: langchain
    ui-field-behaviour:
      hidden-fields:
        - schema
        - port
        - login
      relabeling:
        password: API Key
      placeholders:
        host: "https://api.openai.com/v1 (optional, for custom endpoints / Ollama)"
    conn-fields:
      model:
        label: Chat Model
        description: >
          Chat model in provider:name format dispatched via
          langchain.chat_models.init_chat_model
          (e.g. openai:gpt-4o, anthropic:claude-3-7-sonnet).
        schema:
          type:
            - string
            - 'null'
      embed_model:
        label: Embedding Model
        description: >
          Embedding model in provider:name format dispatched via
          langchain.embeddings.init_embeddings
          (e.g. openai:text-embedding-3-small, cohere:embed-english-v3.0).
        schema:
          type:
            - string
            - 'null'
  - hook-class-name: airflow.providers.common.ai.hooks.llamaindex.LlamaIndexHook
    hook-name: "LlamaIndex"
    connection-type: llamaindex
    ui-field-behaviour:
      hidden-fields:
        - schema
        - port
        - login
      relabeling:
        password: API Key
      placeholders:
        host: "https://api.openai.com/v1 (optional, for custom endpoints / Ollama)"
        extra: '{"embed_model": "text-embedding-3-small", "llm_model": "gpt-4o"}'
    conn-fields:
      embed_model:
        label: Embedding Model
        description: >
          Default LlamaIndex embedding model name (e.g.
          text-embedding-3-small). The OpenAI default; for other vendors
          pass a pre-built BaseEmbedding instance to the operator.
        schema:
          type:
            - string
            - 'null'
      llm_model:
        label: LLM Model
        description: >
          Default LlamaIndex LLM model name (e.g. gpt-4o). The OpenAI
          default; for other vendors pass a pre-built LLM instance to
          the operator.
        schema:
          type:
            - string
            - 'null'

operators:
  - integration-name: Common AI
    python-modules:
      - airflow.providers.common.ai.operators.agent
      - airflow.providers.common.ai.operators.llm
      - airflow.providers.common.ai.operators.llm_file_analysis
      - airflow.providers.common.ai.operators.llm_branch
      - airflow.providers.common.ai.operators.llm_sql
      - airflow.providers.common.ai.operators.llm_schema_compare
      - airflow.providers.common.ai.operators.document_loader
      - airflow.providers.common.ai.operators.llamaindex_embedding
      - airflow.providers.common.ai.operators.llamaindex_retrieval

task-decorators:
  - class-name: airflow.providers.common.ai.decorators.agent.agent_task
    name: agent
  - class-name: airflow.providers.common.ai.decorators.llm.llm_task
    name: llm
  - class-name: airflow.providers.common.ai.decorators.llm_file_analysis.llm_file_analysis_task
    name: llm_file_analysis
  - class-name: airflow.providers.common.ai.decorators.llm_branch.llm_branch_task
    name: llm_branch
  - class-name: airflow.providers.common.ai.decorators.llm_sql.llm_sql_task
    name: llm_sql
  - class-name: airflow.providers.common.ai.decorators.llm_schema_compare.llm_schema_compare_task
    name: llm_schema_compare
