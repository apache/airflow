---

name: orders_from_yaml
rules:
  - name: order_id_not_null
    check: null_count
    column: order_id
    condition:
      equal_to: 0
    dimension: completeness
  - name: amount_min_ge_zero
    check: min
    column: amount
    condition:
      geq_to: 0
  - name: row_count_present
    check: row_count
    condition:
      greater_than: 0
    severity: warn
