integrations:
  - integration-name: Yandex.Cloud
    external-doc-url: https://cloud.yandex.com/
    logo: /docs/integration-logos/Yandex-Cloud.png
    tags: [service]

  - integration-name: Yandex.Cloud Dataproc
    external-doc-url: https://cloud.yandex.com/dataproc
    how-to-guide:
      - /docs/apache-airflow-providers-yandex/operators/dataproc.rst
    logo: /docs/integration-logos/Yandex-Cloud.png
    tags: [service]

  - integration-name: Yandex.Cloud YQ
    external-doc-url: https://cloud.yandex.com/en/services/query
    how-to-guide:
      - /docs/apache-airflow-providers-yandex/operators/yq.rst
    logo: /docs/integration-logos/Yandex-Cloud.png
    tags: [service]

operators:
  - integration-name: Yandex.Cloud Dataproc
    python-modules:
      - airflow.providers.yandex.operators.dataproc
  - integration-name: Yandex.Cloud YQ
    python-modules:
      - airflow.providers.yandex.operators.yq

hooks:
  - integration-name: Yandex.Cloud
    python-modules:
      - airflow.providers.yandex.hooks.yandex
  - integration-name: Yandex.Cloud Dataproc
    python-modules:
      - airflow.providers.yandex.hooks.dataproc
  - integration-name: Yandex.Cloud YQ
    python-modules:
      - airflow.providers.yandex.hooks.yq

connection-types:
  - hook-class-name: airflow.providers.yandex.hooks.yandex.YandexCloudBaseHook
    connection-type: yandexcloud
    ui-field-behaviour:
      hidden-fields:
        - host
        - schema
        - login
        - password
        - port
        - extra

    conn-fields:
      service_account_json:
        label: Service account auth JSON
        schema:
          type:
            - string
            - "null"
          format: password
        description: >-
          Service account auth JSON. Looks like {"id": "...",
          "service_account_id": "...", "private_key": "..."}.
          Will be used instead of OAuth token and SA JSON file path field if specified.
      service_account_json_path:
        label: Service account auth JSON file path
        schema:
          type:
            - string
            - "null"
        description: >-
          Service account auth JSON file path. File content
          looks like {"id": "...", "service_account_id": "...", "private_key": "..."}.
          Will be used instead of OAuth token if specified.
      oauth:
        label: OAuth Token
        schema:
          type:
            - string
            - "null"
          format: password
        description: >-
          User account OAuth token. Either this or service account JSON must be specified.
      folder_id:
        label: Default folder ID
        schema:
          type:
            - string
            - "null"
        description: >-
          Optional. If specified, this ID will be used by default when creating nodes and clusters.
      public_ssh_key:
        label: Public SSH key
        schema:
          type:
            - string
            - "null"
        description: >-
          Optional. The key will be placed to
          all created Compute nodes,
           allowing you to have a root shell there.
      endpoint:
        label: API endpoint
        schema:
          type:
            - string
            - "null"
        description: >-
          Optional. Specify an API endpoint. Leave blank to use default.

secrets-backends:
  - airflow.providers.yandex.secrets.lockbox.LockboxSecretBackend

extra-links:
  - airflow.providers.yandex.links.yq.YQLink

config:
  yandex:
    description: This section contains settings for Yandex Cloud integration.
    options:
      sdk_user_agent_prefix:
        description: |
          Prefix for User-Agent header in Yandex.Cloud SDK requests
        version_added: 3.6.0
        type: string
        example: ~
        default: ""
