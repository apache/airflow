---
package-name: apache-airflow-providers-vespa

name: Vespa

description: |
    `Vespa <https://vespa.ai/>`__

state: ready
lifecycle: incubation
source-date-epoch: 1773842590

# Note that those versions are maintained by release manager - do not update them manually
# with the exception of case where other provider in sources has >= new provider version.
# In such case adding >= NEW_VERSION and bumping to NEW_VERSION in a provider have
# to be done in the same PR
versions:
  - 0.1.0

integrations:
  - integration-name: Vespa
    external-doc-url: https://docs.vespa.ai
    how-to-guide:
      - /docs/apache-airflow-providers-vespa/operators/vespa.rst
    tags: [software]

hooks:
  - integration-name: Vespa
    python-modules:
      - airflow.providers.vespa.hooks.vespa

operators:
  - integration-name: Vespa
    python-modules:
      - airflow.providers.vespa.operators.vespa_ingest

triggers:
  - integration-name: Vespa
    python-modules:
      - airflow.providers.vespa.triggers.vespa_feed_trigger

connection-types:
  - hook-class-name: airflow.providers.vespa.hooks.vespa.VespaHook
    connection-type: vespa
    conn-fields:
      namespace:
        label: Namespace
        schema:
          type:
            - string
            - 'null'
          default: default
        description: >
          Vespa document namespace. Groups documents within a document type for
          access control and distribution. Defaults to "default".
      protocol:
        label: Protocol
        schema:
          type:
            - string
            - 'null'
          default: http
        description: >
          Protocol used to connect to the Vespa endpoint, either "http" or "https".
          Ignored when the Endpoint field already includes a scheme (e.g. "https://…").
          Defaults to "http".
      vespa_cloud_secret_token:
        label: Vespa Cloud Secret Token
        schema:
          type:
            - string
            - 'null'
          format: password
        description: >
          Authentication token for Vespa Cloud. Used as an alternative to mTLS
          certificate authentication. Leave blank when using client certificates.
      client_cert_path:
        label: Client Certificate Path
        schema:
          type:
            - string
            - 'null'
        description: >
          Filesystem path to a PEM-encoded client certificate for mTLS
          authentication. Both this and Client Key Path must be set to enable
          mTLS; otherwise the hook falls back to token authentication.
      client_key_path:
        label: Client Key Path
        schema:
          type:
            - string
            - 'null'
        description: >
          Filesystem path to the PEM-encoded private key that corresponds to the
          client certificate. Required together with Client Certificate Path for
          mTLS authentication.
      max_queue_size:
        label: Max Feed Queue Size
        schema:
          type:
            - integer
            - 'null'
        description: >
          Maximum number of documents to buffer in the pyvespa async feed queue
          before blocking. Increase for higher throughput at the cost of memory.
          Uses the pyvespa default when unset.
      max_workers:
        label: Max Feed Workers
        schema:
          type:
            - integer
            - 'null'
        description: >
          Maximum number of concurrent worker threads used by the pyvespa async
          feed client. Uses the pyvespa default when unset.
      max_connections:
        label: Max Feed Connections
        schema:
          type:
            - integer
            - 'null'
        description: >
          Maximum number of HTTP connections the pyvespa feed client keeps open
          to the Vespa cluster. Uses the pyvespa default when unset.
    ui-field-behaviour:
      hidden-fields:
        - login
        - password
        - extra
      relabeling:
        host: Endpoint
        schema: Document Type
      placeholders:
        host: vespa-endpoint.example.com
        schema: my_document_type
        protocol: https
        namespace: my_namespace
        client_cert_path: /path/to/client.pem
        client_key_path: /path/to/client.key
