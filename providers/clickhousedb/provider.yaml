---
package-name: apache-airflow-providers-clickhousedb
name: ClickHouse
description: |
    `ClickHouse <https://clickhouse.com/>`__

state: ready
lifecycle: production
source-date-epoch: 1710000000
# Note that those versions are maintained by release manager - do not update them manually
# with the exception of case where other provider in sources has >= new provider version.
# In such case adding >= NEW_VERSION and bumping to NEW_VERSION in a provider have
# to be done in the same PR
versions:
  - 1.0.0

integrations:
  - integration-name: ClickHouse
    external-doc-url: https://clickhouse.com/docs
    how-to-guide:
      - /docs/apache-airflow-providers-clickhousedb/operators/clickhouse.rst
    logo: /docs/integration-logos/ClickHouse.png
    tags: [software]

hooks:
  - integration-name: ClickHouse
    python-modules:
      - airflow.providers.clickhousedb.hooks.clickhouse

connection-types:
  - hook-class-name: airflow.providers.clickhousedb.hooks.clickhouse.ClickHouseHook
    connection-type: clickhouse
    hook-name: "ClickHouse"
    ui-field-behaviour:
      hidden-fields: []
      relabeling:
        schema: Database
      placeholders:
        host: localhost
        port: "8123"
        login: default
        schema: default
        extra: |
          {
            "secure": false,
            "verify": true,
            "connect_timeout": 10,
            "send_receive_timeout": 300,
            "compress": true,
            "client_name": "airflow"
          }
    conn-fields:
      secure:
        label: Use TLS (HTTPS)
        schema:
          type:
            - boolean
            - "null"
        description: Enable TLS encryption for the connection
      verify:
        label: Verify SSL Certificate
        schema:
          type:
            - boolean
            - "null"
        description: Verify the server SSL certificate when TLS is enabled
      connect_timeout:
        label: Connection Timeout (seconds)
        schema:
          type:
            - integer
            - "null"
      send_receive_timeout:
        label: Query Timeout (seconds)
        schema:
          type:
            - integer
            - "null"
      compress:
        label: Enable LZ4 Compression
        schema:
          type:
            - boolean
            - "null"
      client_name:
        label: Client Name
        schema:
          type:
            - string
            - "null"
      session_settings:
        label: Session Settings (JSON)
        schema:
          type:
            - object
            - string
            - "null"
        description: >
          ClickHouse session-level settings as a JSON object,
          e.g. {"max_execution_time": 60, "max_threads": 4}.
          These are merged with any session_settings passed to the hook constructor,
          with the constructor argument taking precedence on conflicting keys.
      client_kwargs:
        label: Client kwargs (JSON)
        schema:
          type:
            - object
            - string
            - "null"
        description: >
          Additional keyword arguments forwarded to clickhouse_connect.get_client()
          as a JSON object, e.g. {"http_proxy": "http://proxy:8080"}.
          Hook-managed keys (host, port, username, password, database, secure,
          verify, client_name, settings) are ignored.
