---
package-name: apache-airflow-providers-sdk-executable
name: "SDK: Executable"
description: |
  Native executable language support for Apache Airflow runtime coordinators.
  Supports any compiled binary (Go, Rust, etc.) that implements the Airflow
  SDK coordinator protocol (--comm/--logs socket-based IPC).

state: ready
lifecycle: incubation
source-date-epoch: 1775631151
versions:
  - 0.1.0

integrations:
  - integration-name: Native Executable
    external-doc-url: https://airflow.apache.org/
    tags:
      - software

config:
  executable:
    description: "Options for the native executable language provider."
    options:
      bundles_folder:
        description: |
          Path to the directory containing native executable DAG bundles.
          When using Python stub DAGs that delegate task execution to a
          native runtime, the coordinator scans this directory to find the
          executable matching the target dag_id. Each immediate subdirectory
          is treated as a separate bundle home, and the directory itself is
          also checked (flat layout).
        type: string
        version_added: ~
        example: ~/airflow/executable-bundles
        default: ""

runtime-coordinators:
  - airflow.providers.sdk.executable.coordinator.ExecutableRuntimeCoordinator
