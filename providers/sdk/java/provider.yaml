---
package-name: apache-airflow-providers-sdk-java
name: "SDK: Java"
description: |
  Java SDK support for Apache Airflow runtime coordinators.

state: ready
lifecycle: incubation
source-date-epoch: 1775631151
# Note that those versions are maintained by release manager - do not update them manually
# with the exception of case where other provider in sources has >= new provider version.
# In such case adding >= NEW_VERSION and bumping to NEW_VERSION in a provider have
# to be done in the same PR
versions:
  - 0.1.0

integrations:
  - integration-name: Java
    external-doc-url: https://openjdk.org/
    tags:
      - software

config:
  java:
    description: "Options for the Java SDK provider."
    options:
      bundles_folder:
        description: |
          Path to the directory containing Java DAG bundle JARs.
          When using Python stub DAGs that delegate task execution to Java,
          the coordinator scans this directory to find the JAR bundle matching
          the target dag_id. Each immediate subdirectory is treated as a
          separate bundle home, and the directory itself is also checked
          (flat layout).
        type: string
        version_added: ~
        example: ~/airflow/java-bundles
        default: ""

runtime-coordinators:
  - airflow.providers.sdk.java.coordinator.JavaRuntimeCoordinator
