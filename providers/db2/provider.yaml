---
package-name: apache-airflow-providers-db2
name: IBM Db2
description: |
  `IBM Db2 <https://www.ibm.com/products/db2>`__

state: ready
lifecycle: production
source-date-epoch: 1743033600
versions:
  - 1.0.0

dependencies:
  - apache-airflow>=2.11.0
  - apache-airflow-providers-common-compat>=1.12.0
  - apache-airflow-providers-common-sql>=1.32.0
  - ibm-db>=3.0.0
  - ibm-db-sa>=0.4.0

integrations:
  - integration-name: IBM Db2
    external-doc-url: https://www.ibm.com/products/db2
    logo: /docs/integration-logos/Db2.png
    tags: [software]

hooks:
  - integration-name: IBM Db2
    python-modules:
      - airflow.providers.db2.hooks.db2

operators:
  - integration-name: IBM Db2
    python-modules:
      - airflow.providers.db2.operators.db2

connection-types:
  - hook-class-name: airflow.providers.db2.hooks.db2.Db2Hook
    connection-type: db2
