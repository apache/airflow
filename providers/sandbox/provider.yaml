---
package-name: apache-airflow-providers-sandbox

name: Sandbox

description: |
    Run each Airflow task instance in an ephemeral cloud sandbox
    (local/Daytona/E2B/Modal/islo) behind a pluggable provider layer.

state: not-ready
lifecycle: incubation
source-date-epoch: 0

versions:
  - 0.1.0

executors:
  - airflow.providers.sandbox.executors.sandbox_executor.SandboxExecutor

task-decorators:
  - name: sandbox
    class-name: airflow.providers.sandbox.decorators.sandbox.sandbox_task

config:
  sandbox:
    description: SandboxExecutor configuration.
    options:
      provider:
        description: |
          Sandbox backend: a built-in alias (local|daytona|e2b|modal|islo) or a
          fully-qualified ``module:Class`` path to a custom SandboxProvider.
        type: string
        version_added: 0.1.0
        example: daytona
        default: local
      poll_interval:
        description: Watcher poll cadence in seconds.
        type: integer
        version_added: 0.1.0
        example: ~
        default: "5"
      creation_batch_size:
        description: Maximum sandboxes created per scheduler heartbeat.
        type: integer
        version_added: 0.1.0
        example: ~
        default: "8"
