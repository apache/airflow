[build-system]
requires = ["flit_core==3.12.0"]
build-backend = "flit_core.buildapi"

[project]
name = "apache-airflow-providers-sandbox"
version = "0.1.0"
description = "Provider package apache-airflow-providers-sandbox for Apache Airflow"
readme = "README.rst"
license = "Apache-2.0"
license-files = ['LICENSE', 'NOTICE']
authors = [
    {name="Apache Software Foundation", email="dev@airflow.apache.org"},
]
maintainers = [
    {name="Apache Software Foundation", email="dev@airflow.apache.org"},
]
keywords = [ "airflow-provider", "sandbox", "airflow", "integration", "executor" ]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Environment :: Web Environment",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "Framework :: Apache Airflow",
    "Framework :: Apache Airflow :: Provider",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: System :: Monitoring",
]
requires-python = ">=3.10"

# The dependencies should be modified in place in the generated file.
# Any change in the dependencies is preserved when the file is regenerated.
# Make sure to run ``prek update-providers-dependencies --all-files`` after you
# modify the dependencies, and rebuild your Breeze CI image with ``breeze ci-image build``.
dependencies = [
    "apache-airflow>=2.10.0",
]

# The optional SaaS SDKs are extras: the executor and the local backend work
# without any of them. Each must be vetted against the ASF 3rd-Party License Policy.
[project.optional-dependencies]
daytona = [ "daytona" ]
e2b = [ "e2b" ]
modal = [ "modal" ]
islo = [ "islo" ]

[project.entry-points."apache_airflow_provider"]
provider_info = "airflow.providers.sandbox.get_provider_info:get_provider_info"

[project.urls]
"Source Code" = "https://github.com/apache/airflow"
"Bug Tracker" = "https://github.com/apache/airflow/issues"

[tool.flit.module]
name = "airflow.providers.sandbox"

[tool.flit.sdist]
include = [
    "docs/",
    "provider.yaml",
    "src/airflow/__init__.py",
    "src/airflow/providers/__init__.py",
    "tests/",
]
