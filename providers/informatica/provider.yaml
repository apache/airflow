---
package-name: apache-airflow-providers-informatica
name: Informatica
description: |
  `Informatica <https://www.informatica.com//>`__

state: ready
lifecycle: incubation
source-date-epoch: 1781642052
# Note that those versions are maintained by release manager - do not update them manually
# with the exception of case where other provider in sources has >= new provider version.
# In such case adding >= NEW_VERSION and bumping to NEW_VERSION in a provider have
# to be done in the same PR
versions:
  - 0.2.0
  - 0.1.4
  - 0.1.3
  - 0.1.2
  - 0.1.1

integrations:
  - integration-name: Informatica
    external-doc-url: https://www.informatica.com/
    logo: /docs/integration-logos/informatica.png
    tags: [protocol]

hooks:
  - integration-name: Informatica
    python-modules:
      - airflow.providers.informatica.hooks.edc

connection-types:
  - hook-class-name: airflow.providers.informatica.hooks.edc.InformaticaEDCHook
    hook-name: "Informatica EDC"
    connection-type: informatica_edc

plugins:
  - name: informatica
    plugin-class: airflow.providers.informatica.plugins.InformaticaProviderPlugin

config:
  informatica:
    description: |
      This section applies settings for Informatica integration.
      More about configuration and its precedence can be found in the `usage's guide
      <https://airflow.apache.org/docs/apache-airflow-providers-informatica/stable/guides/usage.html#transport-setup>`_.

    options:
      listener_disabled:
        description: |
          Disable sending events without uninstalling the Informatica Provider by setting this to true.
        type: boolean
        example: ~
        default: "False"
        version_added: ~
      default_conn_id:
        description: |
          The default connection ID to use for Informatica operations.
        type: string
        example: "informatica_edc_default"
        default: "informatica_edc_default"
        version_added: ~
      auto_lineage_enabled:
        description: |
          Enable automatic SQL lineage detection for operators with a ``sql`` attribute.
          When set to ``true``, the provider parses each task's SQL at pre-execution time,
          resolves the referenced tables against the Informatica catalog, and creates lineage
          links on task success.  Set to ``false`` to rely solely on manually declared inlets
          and outlets.
        type: boolean
        example: ~
        default: "True"
        version_added: ~
      disabled_for_operators:
        description: |
          Exclude specific operator classes from Informatica lineage tracking by providing
          a semicolon-separated list of fully-qualified class names.  Operators listed here
          will have neither manual nor automatic lineage processed.
        type: string
        example: >-
          airflow.providers.standard.operators.bash.BashOperator;
          airflow.providers.standard.operators.python.PythonOperator
        default: ""
        version_added: ~
      request_timeout:
        description: |
          Timeout in seconds for HTTP requests made to the Informatica EDC REST API.
        type: integer
        example: "30"
        default: "30"
        version_added: ~
