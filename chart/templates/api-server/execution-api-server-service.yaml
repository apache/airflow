##########################################
## Airflow Execution API Server Service
##########################################
{{- if and .Values.apiServer.enabled .Values.splitApiServersIntoCoreAndExecution }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "airflow.fullname" . }}-execution-api-server
  labels:
    tier: airflow
    component: execution-api-server
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
    {{- if or .Values.labels .Values.apiServer.labels }}
      {{- mustMerge .Values.apiServer.labels .Values.labels | toYaml | nindent 4 }}
    {{- end }}
  {{- with .Values.apiServer.service.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # The execution API server is intended to be reachable only by in-cluster
  # Airflow components (workers, triggerer, dag-processor, scheduler). Pin the
  # service type to ClusterIP so that operators who expose the public API via
  # LoadBalancer/NodePort on `apiServer.service.type` do not accidentally
  # publish the execution surface to the same network.
  type: ClusterIP
  selector:
    tier: airflow
    component: execution-api-server
    release: {{ .Release.Name }}
  ports:
  {{ range .Values.apiServer.service.ports }}
    -
      {{- range $key, $val := . }}
      {{ $key }}: {{ tpl (toString $val) $ }}
      {{- end }}
  {{- end }}
{{- end }}
