################################
## Prometheus Deployment
################################
{{- if .Values.prometheus.enabled }}
{{- $nodeSelector := or .Values.prometheus.nodeSelector .Values.nodeSelector }}
{{- $affinity := or .Values.prometheus.affinity .Values.affinity }}
{{- $tolerations := or .Values.prometheus.tolerations .Values.tolerations }}
{{- $topologySpreadConstraints := or .Values.prometheus.topologySpreadConstraints .Values.topologySpreadConstraints }}
{{- $revisionHistoryLimit := include "airflow.revisionHistoryLimit" (list .Values.prometheus.revisionHistoryLimit .Values.revisionHistoryLimit) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "airflow.fullname" . }}-prometheus
  labels:
    tier: airflow
    component: prometheus
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
    {{- if or .Values.labels .Values.prometheus.labels }}
      {{- mustMerge .Values.prometheus.labels .Values.labels | toYaml | nindent 4 }}
    {{- end }}
  {{- with .Values.prometheus.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: 1
  {{- if ne $revisionHistoryLimit "" }}
  revisionHistoryLimit: {{ $revisionHistoryLimit }}
  {{- end }}
  selector:
    matchLabels:
      tier: airflow
      component: prometheus
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        tier: airflow
        component: prometheus
        release: {{ .Release.Name }}
        {{- if or .Values.labels .Values.prometheus.labels }}
          {{- mustMerge .Values.prometheus.labels .Values.labels | toYaml | nindent 8 }}
        {{- end }}
      annotations:
        checksum/prometheus-config: {{ include (print $.Template.BasePath "/configmaps/prometheus-configmap.yaml") . | sha256sum }}
        {{- with .Values.prometheus.podAnnotations }}
          {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
    spec:
      nodeSelector: {{- toYaml $nodeSelector | nindent 8 }}
      affinity: {{- toYaml $affinity | nindent 8 }}
      tolerations: {{- toYaml $tolerations | nindent 8 }}
      topologySpreadConstraints: {{- toYaml $topologySpreadConstraints | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.prometheus.terminationGracePeriodSeconds }}
      {{- if .Values.prometheus.priorityClassName }}
      priorityClassName: {{ .Values.prometheus.priorityClassName }}
      {{- end }}
      restartPolicy: Always
      securityContext: {{- toYaml .Values.prometheus.securityContexts.pod | nindent 8 }}
      # Prometheus needs to write to /prometheus; run as root in dev
      initContainers:
        - name: fix-permissions
          image: {{ template "prometheus_image" . }}
          command: ["sh", "-c", "chmod 777 /prometheus"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /prometheus
      containers:
        - name: prometheus
          image: {{ template "prometheus_image" . }}
          imagePullPolicy: {{ .Values.images.prometheus.pullPolicy }}
          securityContext: {{- toYaml .Values.prometheus.securityContexts.container | nindent 12 }}
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - name: prometheus
              containerPort: {{ .Values.ports.prometheusServer }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: {{ .Values.ports.prometheusServer }}
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /-/ready
              port: {{ .Values.ports.prometheusServer }}
            initialDelaySeconds: 15
            periodSeconds: 15
          resources: {{- toYaml .Values.prometheus.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: {{ include "airflow.fullname" . }}-prometheus
        - name: data
          emptyDir: {}
{{- end }}
