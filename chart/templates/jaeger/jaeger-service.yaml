################################
## Jaeger Service
################################
{{- if .Values.jaeger.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "airflow.fullname" . }}-jaeger
  labels:
    tier: airflow
    component: jaeger
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
    {{- if or .Values.labels .Values.jaeger.labels }}
      {{- mustMerge .Values.jaeger.labels .Values.labels | toYaml | nindent 4 }}
    {{- end }}
  {{- with .Values.jaeger.service.extraAnnotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    tier: airflow
    component: jaeger
    release: {{ .Release.Name }}
  ports:
    - name: ui
      protocol: TCP
      port: {{ .Values.ports.jaegerUI }}
      targetPort: {{ .Values.ports.jaegerUI }}
    - name: otlp-grpc
      protocol: TCP
      port: {{ .Values.ports.jaegerOtlpGrpc }}
      targetPort: {{ .Values.ports.jaegerOtlpGrpc }}
    - name: otlp-http
      protocol: TCP
      port: {{ .Values.ports.jaegerOtlpHttp }}
      targetPort: {{ .Values.ports.jaegerOtlpHttp }}
{{- end }}
