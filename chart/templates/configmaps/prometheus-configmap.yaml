################################
## Prometheus ConfigMap
################################
{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "airflow.fullname" . }}-prometheus
  labels:
    tier: airflow
    component: config
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
    {{- with .Values.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
      scrape_timeout: 10s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:{{ .Values.ports.prometheusServer }}"]

      {{- if .Values.statsd.enabled }}
      - job_name: statsd-exporter
        static_configs:
          - targets: ["{{ include "airflow.fullname" . }}-statsd:{{ .Values.ports.statsdScrape }}"]
      {{- end }}

      {{- if .Values.otelCollector.enabled }}
      - job_name: otel-collector
        static_configs:
          - targets: ["{{ include "airflow.fullname" . }}-otel-collector:{{ .Values.ports.otelCollectorScrape }}"]
      {{- end }}

      {{- with .Values.prometheus.extraScrapeConfigs }}
        {{- toYaml . | nindent 6 }}
      {{- end }}
{{- end }}
