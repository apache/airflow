################################
## Grafana ConfigMap
################################
{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "airflow.fullname" . }}-grafana
  labels:
    tier: airflow
    component: config
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
    {{- with .Values.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "airflow.fullname" . }}-prometheus:{{ .Values.ports.prometheusServer }}
        isDefault: true

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: dashboards
        folder: Airflow
        type: file
        editable: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards

  airflow_metrics.json: |
    {{ .Files.Get "files/grafana-airflow-dashboard.json" | nindent 4 }}
{{- end }}
