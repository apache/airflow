# Throwaway in-cluster MIT Kerberos KDC for testing the overlay pattern.
# Do not point production workloads at this. The admin password is a
# fixed literal and the database lives in an emptyDir.
#
# Image: gcavalcante8808/krb5-server is a small image popular for CI test
# setups. For reproducibility, pin to an immutable digest before using
# this overlay in any environment that is not a local kind cluster.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: RELEASE-NAME-kerberos-kdc
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: RELEASE-NAME-kerberos-kdc
  template:
    metadata:
      labels:
        app: RELEASE-NAME-kerberos-kdc
    spec:
      containers:
        - name: kdc
          image: gcavalcante8808/krb5-server:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: KRB5_REALM
              value: EXAMPLE.COM
            - name: KRB5_KDC
              value: RELEASE-NAME-kerberos-kdc.NAMESPACE.svc.cluster.local
            - name: KRB5_PASS
              value: kerberos
          ports:
            - name: kdc-tcp
              containerPort: 88
              protocol: TCP
            - name: kdc-udp
              containerPort: 88
              protocol: UDP
            - name: kadmin
              containerPort: 749
              protocol: TCP
          # TCP probe on port 88 — the principal-file check we used to
          # do here only said "the KDC database was initialised", not
          # "krb5kdc is actually accepting connections". That left a
          # multi-second window where the pod was Ready but kinit
          # immediately after would hit a closed port, producing
          # `Resource temporarily unavailable`. A tcpSocket probe only
          # goes green when krb5kdc has bound and listen()ed.
          readinessProbe:
            tcpSocket:
              port: kdc-tcp
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 3
            failureThreshold: 20
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: krb5-conf
              mountPath: /etc/krb5.conf
              subPath: krb5.conf
              readOnly: true
      volumes:
        - name: krb5-conf
          configMap:
            name: RELEASE-NAME-krb5-conf
