# Minimal namespace-scoped permissions for the keytab bootstrap Job:
# - exec into the KDC pod to run kadmin.local and ktadd
# - create/update the keytab Secret in the same namespace
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: RELEASE-NAME-kerberos-bootstrap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: RELEASE-NAME-kerberos-bootstrap
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: RELEASE-NAME-kerberos-bootstrap
subjects:
  - kind: ServiceAccount
    name: RELEASE-NAME-kerberos-bootstrap
roleRef:
  kind: Role
  name: RELEASE-NAME-kerberos-bootstrap
  apiGroup: rbac.authorization.k8s.io
