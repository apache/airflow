# krb5.conf for the in-cluster test KDC.
#
# The realm name (EXAMPLE.COM) is intentionally fixed for the PoC. If you
# need a different realm, edit both occurrences below and the matching
# KRB5_REALM env var in kdc-deployment.yaml.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: RELEASE-NAME-krb5-conf
data:
  krb5.conf: |
    [libdefaults]
        default_realm = EXAMPLE.COM
        dns_lookup_realm = false
        dns_lookup_kdc = false
        ticket_lifetime = 24h
        renew_lifetime = 7d
        forwardable = true
        rdns = false

    [realms]
        EXAMPLE.COM = {
            kdc = RELEASE-NAME-kerberos-kdc.NAMESPACE.svc.cluster.local:88
            admin_server = RELEASE-NAME-kerberos-kdc.NAMESPACE.svc.cluster.local:749
        }

    [domain_realm]
        .NAMESPACE.svc.cluster.local = EXAMPLE.COM
        NAMESPACE.svc.cluster.local = EXAMPLE.COM
