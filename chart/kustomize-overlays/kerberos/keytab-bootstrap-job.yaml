# Bootstrap Job that:
#   1. Waits for the KDC pod to be Ready.
#   2. Execs kadmin.local against the KDC pod to create the
#      airflow service principal with a random key and write a
#      keytab to /tmp inside the KDC container.
#   3. Copies the keytab out via kubectl cp and stores it in a
#      Secret named "<release>-kerberos-keytab" under key "airflow.keytab".
#
# Idempotent: the Job uses kubectl apply for the Secret and "addprinc
# -randkey ... || true" so a re-apply rotates the key cleanly.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: RELEASE-NAME-keytab-bootstrap
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: RELEASE-NAME-keytab-bootstrap
    spec:
      restartPolicy: OnFailure
      serviceAccountName: RELEASE-NAME-kerberos-bootstrap
      containers:
        - name: bootstrap
          # alpine/k8s ships kubectl + bash (the bootstrap script below needs
          image: alpine/k8s:1.31.0
          imagePullPolicy: IfNotPresent
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KDC_LABEL
              value: app=RELEASE-NAME-kerberos-kdc
            - name: PRINCIPAL
              value: airflow/airflow.NAMESPACE.svc.cluster.local@EXAMPLE.COM
            - name: SECRET_NAME
              value: RELEASE-NAME-kerberos-keytab
          command:
            - /bin/bash
            - -ceu
            - |
              echo "Waiting for KDC pod to be Ready..."
              kubectl wait --for=condition=Ready pod -l "${KDC_LABEL}" \
                --namespace "${NAMESPACE}" --timeout=180s
              KDC_POD=$(kubectl get pod -l "${KDC_LABEL}" \
                --namespace "${NAMESPACE}" -o jsonpath='{.items[0].metadata.name}')
              echo "KDC pod: ${KDC_POD}"

              echo "Creating principal ${PRINCIPAL}..."
              kubectl exec -n "${NAMESPACE}" "${KDC_POD}" -- \
                kadmin.local -q "addprinc -randkey ${PRINCIPAL}" || true
              kubectl exec -n "${NAMESPACE}" "${KDC_POD}" -- \
                kadmin.local -q "ktadd -k /tmp/airflow.keytab ${PRINCIPAL}"

              echo "Copying keytab out..."
              TMPFILE=$(mktemp)
              kubectl cp -n "${NAMESPACE}" "${KDC_POD}":/tmp/airflow.keytab "${TMPFILE}"
              test -s "${TMPFILE}"

              echo "Writing Secret ${SECRET_NAME}..."
              kubectl create secret generic "${SECRET_NAME}" \
                --namespace "${NAMESPACE}" \
                --from-file=airflow.keytab="${TMPFILE}" \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "Done."
