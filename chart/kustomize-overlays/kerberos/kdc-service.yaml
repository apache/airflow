---
apiVersion: v1
kind: Service
metadata:
  name: RELEASE-NAME-kerberos-kdc
spec:
  type: ClusterIP
  selector:
    app: RELEASE-NAME-kerberos-kdc
  ports:
    - name: kdc-tcp
      port: 88
      protocol: TCP
      targetPort: kdc-tcp
    - name: kdc-udp
      port: 88
      protocol: UDP
      targetPort: kdc-udp
    - name: kadmin
      port: 749
      protocol: TCP
      targetPort: kadmin
