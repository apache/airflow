# Initial PoC overlay. The verify: block below is the smoke-test
# contract consumed by `breeze k8s smoke-test-overlay kerberos`. Run
# that command locally with --promote-status (and let CI re-run it on
# every PR) to advance status to `tested` with chart-version +
# last-verified filled in automatically.
---
status: not-tested
reason: >-
  PoC overlay that stands up a throwaway in-cluster MIT Kerberos KDC,
  creates the airflow service principal, and writes the keytab to a
  Secret consumable by the chart's existing kerberos sidecar. The
  `verify:` block is the smoke-test contract; run
  `breeze k8s smoke-test-overlay kerberos --promote-status` locally to
  evaluate it and auto-flip status to `tested`.
verify:
  timeout_seconds: 300
  resources:
    - kind: Deployment
      name: RELEASE-NAME-kerberos-kdc
      ready: true
    - kind: Service
      name: RELEASE-NAME-kerberos-kdc
    - kind: Job
      name: RELEASE-NAME-keytab-bootstrap
      complete: true
    - kind: Secret
      name: RELEASE-NAME-kerberos-keytab
