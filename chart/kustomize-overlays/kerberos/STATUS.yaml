# Initial PoC overlay. The verify: block below is consumed by
# `breeze k8s smoke-test-overlay kerberos` to assert that every resource
# the overlay produces reaches its declared state in a real cluster.
#
# Flip `status` to `tested` (with chart-version and last-verified) once
# the smoke test runs green locally and in CI.
---
status: not-tested
reason: >-
  PoC overlay that stands up a throwaway in-cluster MIT Kerberos KDC,
  creates the airflow service principal, and writes the keytab to a
  Secret consumable by the chart's existing kerberos sidecar. The
  `verify:` block is the smoke-test contract; run
  `breeze k8s smoke-test-overlay kerberos` locally to evaluate it.
verify:
  timeout_seconds: 300
  resources:
    - kind: Deployment
      name: RELEASE-NAME-kerberos-kdc
      ready: true
    - kind: Service
      name: RELEASE-NAME-kerberos-kdc
    - kind: Job
      name: RELEASE-NAME-keytab-bootstrap
      complete: true
    - kind: Secret
      name: RELEASE-NAME-kerberos-keytab
