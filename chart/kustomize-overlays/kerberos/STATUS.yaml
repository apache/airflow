# The verify: block below is the smoke-test contract consumed by
# `breeze k8s smoke-test-overlay kerberos`. Run that command locally
# with --promote-status to refresh chart-version + last-verified
# automatically after a successful run; CI re-runs the smoke test on
# every PR but never mutates this file (CI=true refuses
# --promote-status).
---
status: tested
chart-version: 1.22.0
last-verified: '2026-05-15'
verify:
  timeout_seconds: 300
  # Resource names are the suffix only - the smoke-test runner
  # prepends the current release name (default `airflow`) so the
  # same overlay works under any release. Listed in dependency order
  # so a partial-apply failure trips on the first missing thing
  # rather than several steps later via a confusing pod-mount error.
  resources:
    - kind: ConfigMap
      name: krb5-conf
    - kind: Deployment
      name: kerberos-kdc
      ready: true
    - kind: Service
      name: kerberos-kdc
    - kind: Job
      name: keytab-bootstrap
      complete: true
    - kind: Secret
      name: kerberos-keytab
