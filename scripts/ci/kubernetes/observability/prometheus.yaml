---
################################
## Prometheus ConfigMap
################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-prometheus
  labels:
    tier: airflow
    component: config
    release: airflow
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
      scrape_timeout: 10s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: statsd-exporter
        static_configs:
          - targets: ["airflow-statsd:9102"]

      - job_name: otel-collector
        static_configs:
          - targets: ["airflow-otel-collector:8889"]
---
################################
## Prometheus Deployment
################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-prometheus
  labels:
    tier: airflow
    component: prometheus
    release: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      tier: airflow
      component: prometheus
      release: airflow
  template:
    metadata:
      labels:
        tier: airflow
        component: prometheus
        release: airflow
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      # Prometheus needs to write to /prometheus; run as root in dev
      initContainers:
        - name: fix-permissions
          image: prom/prometheus:v3.1.0
          command: ["sh", "-c", "chmod 777 /prometheus"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v3.1.0
          imagePullPolicy: IfNotPresent
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - name: prometheus
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 15
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: airflow-prometheus
        - name: data
          emptyDir: {}
---
################################
## Prometheus Service
################################
apiVersion: v1
kind: Service
metadata:
  name: airflow-prometheus
  labels:
    tier: airflow
    component: prometheus
    release: airflow
spec:
  type: ClusterIP
  selector:
    tier: airflow
    component: prometheus
    release: airflow
  ports:
    - name: prometheus
      protocol: TCP
      port: 9090
      targetPort: 9090
