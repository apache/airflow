              "refId": "B"
            }
          ],
          "thresholds": [],
          "timeFrom": null,
          "timeRegions": [],
          "timeShift": null,
          "title": "Airflow Running and Queued Tasks",
          "tooltip": {
            "shared": true,
            "sort": 0,
