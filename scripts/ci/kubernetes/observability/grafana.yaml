---
################################
## Grafana ConfigMap
################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-grafana
  labels:
    tier: airflow
    component: config
    release: airflow
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://airflow-prometheus:9090
        isDefault: true

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: dashboards
        folder: Airflow
        type: file
        editable: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards

  airflow_metrics.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "gnetId": null,
      "graphTooltip": 0,
      "id": 1,
      "links": [],
      "panels": [
        {
          "aliasColors": {},
          "bars": false,
          "dashLength": 10,
          "dashes": false,
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "custom": {}
            },
            "overrides": []
          },
          "fill": 1,
          "fillGradient": 0,
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "hiddenSeries": false,
          "id": 2,
          "legend": {
            "avg": false,
            "current": false,
            "max": false,
            "min": false,
            "show": true,
            "total": false,
            "values": false
          },
          "lines": true,
          "linewidth": 1,
          "nullPointMode": "null",
          "percentage": false,
          "pluginVersion": "7.1.5",
          "pointradius": 2,
          "points": false,
          "renderer": "flot",
          "seriesOverrides": [],
          "spaceLength": 10,
          "stack": false,
          "steppedLine": false,
          "targets": [
            {
              "expr": "airflow_executor_queued_tasks",
              "interval": "",
              "legendFormat": "Airflow Queued Tasks",
              "refId": "A"
            },
            {
              "expr": "airflow_executor_running_tasks",
              "interval": "",
