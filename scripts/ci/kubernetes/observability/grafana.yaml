---
################################
## Grafana Deployment
################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-grafana
  labels:
    tier: airflow
    component: grafana
    release: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      tier: airflow
      component: grafana
      release: airflow
  template:
    metadata:
      labels:
        tier: airflow
        component: grafana
        release: airflow
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      containers:
        - name: grafana
          image: grafana/grafana:8.2.4
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_NAME
              value: "Main Org."
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
          ports:
            - name: grafana
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
          volumeMounts:
            - name: config
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: config
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: config
              mountPath: /var/lib/grafana/dashboards/airflow_metrics.json
              subPath: airflow_metrics.json
      volumes:
        - name: config
          configMap:
            name: airflow-grafana
---
################################
## Grafana Service
################################
apiVersion: v1
kind: Service
metadata:
  name: airflow-grafana
  labels:
    tier: airflow
    component: grafana
    release: airflow
spec:
  type: ClusterIP
  selector:
    tier: airflow
    component: grafana
    release: airflow
  ports:
    - name: grafana
      protocol: TCP
      port: 3000
      targetPort: 3000
