[build-system]
requires = ["flit_core==3.12.0"]
build-backend = "flit_core.buildapi"

[project]
name = "airflow-shared"
description = "Shared code between airflow-core and task-sdk"
version = "0.0"
classifiers = [
    "Private :: Do Not Upload",
]


dependencies = [
  # DO NOT PUT ANY DEPENDENCIES HERE. Since this distribution is not
  # installable, any dependencies should be put directly into the projects
  # which vendor this -- airflow-core and task-sdk
]

[tool.flit.module]
name = "airflow_shared"

[tool.ruff]
extend = "../../pyproject.toml"
src = ["src"]

[tool.ruff.lint.per-file-ignores]

# Ignore Doc rules et al for anything outside of tests
"!src/*" = ["D", "TID253", "S101", "TRY002"]

[tool.ruff.lint.isort]
known-first-party = ["airflow_shared"]
