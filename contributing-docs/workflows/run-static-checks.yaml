---
id: run-static-checks
category: linting
description: Run fast static checks with prek before committing
prereqs:
  - setup-breeze-environment
steps:
  - context: host
    command: "prek run --from-ref {target_branch} --stage pre-commit"
    description: "Run pre-commit stage checks (ruff, mypy, license headers, etc.)"
parameters:
  target_branch:
    description: "Branch the PR will be merged into, usually 'main'"
    required: true
    default: "main"
expected_output: "All checks passed."
