---
id: run-single-test
category: testing
description: Run a targeted test for a changed module or provider
prereqs:
  - setup-breeze-environment
steps:
  - context: host
    command: "uv run --project {project} pytest {test_path} -xvs"
    condition: system_deps_available
    description: "Preferred: run directly with uv (faster, debuggable in IDE)"
  - context: host
    command: "breeze run pytest {test_path} -xvs"
    fallback_for: system_deps_available
    description: "Fallback: use Breeze when system deps are missing (e.g. mysql, kubernetes libraries)"
  - context: breeze
    command: "pytest {test_path} -xvs"
    description: "Inside Breeze container"
parameters:
  project:
    description: "Path to distribution folder containing pyproject.toml (e.g. providers/amazon)"
    required: true
  test_path:
    description: "Path to test file or directory (e.g. providers/amazon/tests/test_s3.py)"
    required: true
expected_output: "passed"
